<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無限そば道</title>

<style>
body{margin:0;background:black;color:white;overflow:hidden;font-family:sans-serif;}

#titleScreen{
 position:fixed;width:100%;height:100%;
 display:flex;flex-direction:column;justify-content:center;align-items:center;
}
.menuBtn{
 width:260px;padding:16px;margin:10px;
 font-size:22px;background:gold;border:none;border-radius:10px;
}

#game{
 position:absolute;left:50%;top:50%;
 transform:translate(-50%,-50%);
 width:420px;height:650px;display:none;background:#111;
}

.note{
 position:absolute;width:60px;height:60px;background:white;
 transform:translate(-50%,-50%);
}

.hit{
 position:absolute;top:560px;width:90px;height:90px;
 border:3px solid white;border-radius:50%;
 transform:translate(-50%,-50%);
}
.red{left:70px;}
.blue{left:210px;}
.green{left:350px;}

#ui{position:absolute;left:20px;top:40px;display:none;}
#judge{
 position:absolute;left:50%;transform:translateX(-50%);
 bottom:150px;font-size:40px;opacity:0;
}
.show{animation:judge 0.5s;}
@keyframes judge{
 0%{opacity:1;}
 100%{opacity:0;transform:translate(-50%,-40px);}
}

#result,#ranking{
 display:none;position:fixed;width:100%;height:100%;
 text-align:center;padding-top:120px;
}
</style>
</head>

<body>

<div id="titleScreen">
 <h1>無限そば道</h1>
 <button class="menuBtn" onclick="startGame(30)">30秒</button>
 <button class="menuBtn" onclick="startGame(60)">60秒</button>
 <button class="menuBtn" onclick="startGame(120)">120秒</button>
 <button class="menuBtn" onclick="startInfinite()">無限</button>
 <button class="menuBtn" onclick="showRanking()">ランキング</button>
</div>

<div id="game">
 <div class="hit red"></div>
 <div class="hit blue"></div>
 <div class="hit green"></div>
 <div id="judge"></div>
</div>

<div id="ui">
 スコア:<span id="score">0</span><br>
 コンボ:<span id="combo">0</span>
</div>

<div id="result"></div>
<div id="ranking"><div id="rankList"></div></div>

<script>
// ===== 要素 =====
const titleScreen = document.getElementById("titleScreen");
const game = document.getElementById("game");
const ui = document.getElementById("ui");
const result = document.getElementById("result");
const ranking = document.getElementById("ranking");
const rankList = document.getElementById("rankList");
const judge = document.getElementById("judge");

const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");

// ===== 変数 =====
let notes=[],score=0,combo=0,maxCombo=0;
let perfect=0,great=0,miss=0,isAllPerfect=true;
let running=false;

const laneX=[70,210,350];
const HIT=560;

// ===== スタート =====
function startGame(sec){
 startCommon();
 setTimeout(endGame,sec*1000);
}
function startInfinite(){
 startCommon();
}
function startCommon(){
 titleScreen.style.display="none";
 result.style.display="none";
 ranking.style.display="none";
 game.style.display="block";
 ui.style.display="block";

 notes=[];score=0;combo=0;maxCombo=0;
 perfect=0;great=0;miss=0;isAllPerfect=true;
 running=true;

 loop();
 spawn();
}

// ===== ノーツ =====
function spawn(){
 if(!running)return;
 let lane=Math.floor(Math.random()*3);
 let n=document.createElement("div");
 n.className="note";
 n.style.left=laneX[lane]+"px";
 n.style.top="-50px";
 game.appendChild(n);
 notes.push({el:n,y:-50,lane});
 setTimeout(spawn,400);
}

// ===== ループ =====
function loop(){
 if(!running)return;
 notes.forEach(n=>{
  n.y+=8+combo*0.05;
  n.el.style.top=n.y+"px";
 });
 requestAnimationFrame(loop);
}

// ===== 判定 =====
function hit(l){
 let t=notes.find(n=>n.lane===l && Math.abs(n.y-HIT)<80);

 if(!t){
  combo=0;
  miss++;
  isAllPerfect=false;
  showJudge("MISS");
  return;
 }

 let diff=Math.abs(t.y-HIT);
 let r;

 if(diff<30){
  r="PERFECT"; perfect++;
 }else if(diff<70){
  r="GREAT"; great++; isAllPerfect=false;
 }else{
  r="MISS"; miss++; isAllPerfect=false; combo=0;
 }

 if(r!=="MISS"){
  score+=300*(1+combo*0.05);
  combo++;
  if(combo>maxCombo) maxCombo=combo;
  t.el.remove();
  notes=notes.filter(n=>n!==t);
 }

 scoreEl.innerText=Math.floor(score);
 comboEl.innerText=combo;

 showJudge(r);
}

// ===== 判定表示修正 =====
function showJudge(text){
 judge.classList.remove("show"); // ←これが重要
 void judge.offsetWidth;        // ←再アニメーション用
 judge.innerText =
  text==="PERFECT"?"極上":
  text==="GREAT"?"良打":"茹で過ぎ";
 judge.classList.add("show");
}

// ===== ランク復活 =====
function getRank(){
 if(isAllPerfect && perfect>0) return "越前極";

 let total=perfect+great+miss;
 if(total===0) return "C";

 let rate=perfect/total;

 if(rate>=0.95)return "SS";
 if(rate>=0.9)return "S";
 if(rate>=0.8)return "A";
 if(rate>=0.7)return "B";
 return "C";
}

// ===== 終了 =====
function endGame(){
 running=false;
 game.style.display="none";
 ui.style.display="none";
 result.style.display="block";

 let r=getRank();

 result.innerHTML=`
 スコア:${Math.floor(score)}<br>
 最大コンボ:${maxCombo}<br>
 ランク:${r}<br><br>
 <button onclick="location.reload()">戻る</button>
 `;
}

// ===== ランキング（ローカル） =====
function showRanking(){
 titleScreen.style.display="none";
 ranking.style.display="block";
 let data=JSON.parse(localStorage.getItem("rank")||"[]");
 rankList.innerHTML=data.map((d,i)=>`
  <div>${i+1}位 ${d.name} ${d.score}</div>
 `).join("");
}

// ===== 操作 =====
document.addEventListener("keydown",e=>{
 if(!running)return;
 if(e.key==="a") hit(0);
 if(e.key==="s") hit(1);
 if(e.key==="l") hit(2);
});
</script>

</body>
</html>
