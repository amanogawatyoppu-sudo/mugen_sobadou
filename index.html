<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無限そば道</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 overflow:hidden;
}

/* タイトル */
#titleScreen{
 position:fixed;width:100%;height:100%;
 display:flex;flex-direction:column;
 justify-content:center;align-items:center;
}
#title{
 font-size:64px;
 color:gold;
}
.menuBtn{
 width:260px;padding:16px;margin:10px;
 font-size:22px;
 background:gold;
 border:none;border-radius:10px;
}

/* ゲーム */
#game{
 position:absolute;
 left:50%;top:50%;
 transform:translate(-50%,-50%);
 width:420px;height:650px;
 display:none;
 background:#111;
}

.hit{
 position:absolute;
 top:560px;
 width:90px;height:90px;
 border-radius:50%;
 border:3px solid white;
 transform:translate(-50%,-50%);
}
.red{left:70px;}
.blue{left:210px;}
.green{left:350px;}

#ui{
 position:absolute;
 left:20px;top:40px;
 display:none;
}
</style>
</head>

<body>

<div id="titleScreen">
 <div id="title">無限そば道</div>
 <button class="menuBtn" onclick="startGame(30)">30秒</button>
 <button class="menuBtn" onclick="startGame(60)">60秒</button>
 <button class="menuBtn" onclick="startGame(120)">120秒</button>
 <button class="menuBtn" onclick="startInfinite()">無限</button>
 <button class="menuBtn" onclick="showRanking()">ランキング</button>
</div>

<div id="game">
 <div class="hit red"></div>
 <div class="hit blue"></div>
 <div class="hit green"></div>
</div>

<div id="ui">
 スコア: <span id="score">0</span>
</div>

<script>
// ===== ここ重要 =====

// 変数
let running=false;
let score=0;

// スタート
function startGame(sec){
 console.log("startGame動いた"); // ←確認用
 startCommon();
 setTimeout(endGame,sec*1000);
}

function startInfinite(){
 console.log("startInfinite動いた");
 startCommon();
}

// 共通
function startCommon(){
 document.getElementById("titleScreen").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("ui").style.display="block";

 running=true;
 score=0;
}

// 終了
function endGame(){
 running=false;
 alert("終了 スコア:"+score);
 location.reload();
}

// ランキング
function showRanking(){
 alert("ランキング（まだ未実装）");
}

// キー操作
document.addEventListener("keydown",e=>{
 if(!running)return;

 if(e.key==="a"||e.key==="s"||e.key==="l"){
  score+=100;
  document.getElementById("score").innerText=score;
 }
});
</script>

</body>
</html>
