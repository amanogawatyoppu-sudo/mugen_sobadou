<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>無限そば道</title>

<style>
body{
 margin:0;
 background:black;
 color:white;
 font-family:sans-serif;
 overflow:hidden;
}

/* タイトル */
#titleScreen{
 position:fixed;width:100%;height:100%;
 display:flex;flex-direction:column;
 justify-content:center;align-items:center;
}
.menuBtn{
 width:260px;padding:16px;margin:10px;
 font-size:22px;
 background:gold;
 border:none;border-radius:10px;
 cursor:pointer;
}

/* ゲーム */
#game{
 position:absolute;
 left:50%;top:50%;
 transform:translate(-50%,-50%);
 width:420px;height:650px;
 display:none;
 background:#111;
}

.note{
 position:absolute;
 width:60px;height:60px;
 background:white;
 border-radius:10px;
 transform:translate(-50%,-50%);
}

/* 判定ライン */
.hit{
 position:absolute;
 top:560px;
 width:90px;height:90px;
 border-radius:50%;
 border:3px solid white;
 transform:translate(-50%,-50%);
}
.red{left:70px;}
.blue{left:210px;}
.green{left:350px;}

/* UI */
#ui{
 position:absolute;
 left:20px;top:40px;
 display:none;
}
#score{font-size:30px;color:gold;}
#combo{font-size:40px;color:orange;}

/* リザルト */
#result{
 display:none;
 position:fixed;
 width:100%;height:100%;
 text-align:center;
 padding-top:120px;
}
</style>
</head>

<body>

<div id="titleScreen">
 <h1>無限そば道</h1>
 <button class="menuBtn" onclick="startGame(30)">30秒</button>
 <button class="menuBtn" onclick="startGame(60)">60秒</button>
 <button class="menuBtn" onclick="startGame(120)">120秒</button>
 <button class="menuBtn" onclick="startInfinite()">無限</button>
</div>

<div id="game">
 <div class="hit red"></div>
 <div class="hit blue"></div>
 <div class="hit green"></div>
</div>

<div id="ui">
 <div>スコア:<span id="score">0</span></div>
 <div>コンボ:<span id="combo">0</span></div>
</div>

<div id="result"></div>

<script>
// ===== 変数 =====
let notes=[],score=0,combo=0,maxCombo=0;
let running=false,isInfinite=false;

const laneX=[70,210,350];
const HIT=560;

// ===== スタート =====
function startGame(sec){
 isInfinite=false;
 startCommon();
 setTimeout(endGame,sec*1000);
}
function startInfinite(){
 isInfinite=true;
 startCommon();
}
function startCommon(){
 document.getElementById("titleScreen").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("ui").style.display="block";

 notes=[];
 score=0;
 combo=0;
 maxCombo=0;
 running=true;

 loop();
 spawn();
}

// ===== ノーツ生成 =====
function spawn(){
 if(!running)return;

 let lane=Math.floor(Math.random()*3);
 let n=document.createElement("div");
 n.className="note";
 n.style.left=laneX[lane]+"px";
 n.style.top="-50px";

 document.getElementById("game").appendChild(n);

 notes.push({el:n,y:-50,lane});

 setTimeout(spawn,400);
}

// ===== ループ =====
function loop(){
 if(!running)return;

 notes.forEach(n=>{
  n.y+=8+combo*0.05;
  n.el.style.top=n.y+"px";
 });

 requestAnimationFrame(loop);
}

// ===== 判定 =====
function hit(l){
 let target = notes.find(n=>n.lane===l && Math.abs(n.y-HIT)<80);

 if(!target){
  combo=0;
  document.getElementById("combo").innerText=combo;
  return;
 }

 score+=100*(1+combo*0.05);
 combo++;
 if(combo>maxCombo) maxCombo=combo;

 target.el.remove();
 notes = notes.filter(n=>n!==target);

 document.getElementById("score").innerText=Math.floor(score);
 document.getElementById("combo").innerText=combo;
}

// ===== 終了 =====
function endGame(){
 running=false;

 document.getElementById("game").style.display="none";
 document.getElementById("ui").style.display="none";

 document.getElementById("result").style.display="block";
 document.getElementById("result").innerHTML = `
 <h1>結果</h1>
 スコア:${Math.floor(score)}<br>
 最大コンボ:${maxCombo}<br><br>
 <button onclick="location.reload()">戻る</button>
 `;
}

// ===== 操作 =====
document.addEventListener("keydown",e=>{
 if(!running)return;

 if(e.key==="a") hit(0);
 if(e.key==="s") hit(1);
 if(e.key==="l") hit(2);
});
</script>

</body>
</html>
